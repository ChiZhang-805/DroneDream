name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (ruff, mypy, pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend (editable + dev extras)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./backend[dev]"

      - name: Ruff
        run: ruff check backend

      - name: Mypy
        run: mypy backend/app

      - name: Pytest
        run: pytest backend

  worker:
    name: Worker (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install worker (backend editable first, then worker dev extras)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ./backend
          python -m pip install -e "./worker[dev]"

      - name: Ruff
        run: ruff check worker

  frontend:
    name: Frontend (typecheck, lint, build, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
