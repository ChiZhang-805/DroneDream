services:
  web:
    build:
      context: ../..
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_HOSTED_MODE: "true"
        VITE_LOCK_SIMULATOR_BACKEND: "true"
        VITE_DEFAULT_SIMULATOR_BACKEND: real_cli
        VITE_REQUIRE_DEMO_AUTH_TOKEN: "true"
        VITE_SERVER_OPENAI_ENABLED: "true"
    ports: ["8080:80"]
    volumes: ["./nginx.conf:/etc/nginx/conf.d/default.conf:ro"]
    depends_on: [backend]
  backend:
    build:
      context: ../..
      dockerfile: docker/backend.Dockerfile
    env_file: .env
    depends_on: [postgres]
    volumes: ["artifacts:/artifacts"]
  worker:
    build:
      context: ../..
      dockerfile: docker/worker.Dockerfile
    env_file: .env
    depends_on: [backend, postgres]
    volumes: ["artifacts:/artifacts"]
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes: ["pgdata:/var/lib/postgresql/data"]
  worker-px4:
    profiles: ["px4"]
    build:
      context: ../..
      dockerfile: docker/worker-px4.Dockerfile
    env_file: .env
    depends_on: [backend, postgres]
    volumes: ["artifacts:/artifacts"]
volumes:
  pgdata:
  artifacts:
